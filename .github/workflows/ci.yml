name: CI - Stewart Control

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─────────────────────────────────────────────
  # Job 1 : Linting & Formatage
  # ─────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linting tools
        run: pip install black flake8

      - name: Check Black formatting
        run: |
          black --check --diff \
            src/stewart_control/stewart_control/ \
            src/stewart_control/test/

      - name: Run Flake8
        run: |
          flake8 \
            src/stewart_control/stewart_control/ \
            src/stewart_control/test/ \
            --max-line-length=88 \
            --extend-ignore=E203,W503

  # ─────────────────────────────────────────────
  # Job 2 : Tests unitaires
  # ─────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-24.04
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install numpy pytest
          pip install -e src/stewart_control/

      - name: Run tests
        run: |
          python -m pytest \
            src/stewart_control/test/test_inv_kinematics.py \
            src/stewart_control/test/test_fusion.py \
            -v --tb=short

  # ─────────────────────────────────────────────
  # Job 3 : Build ROS2 (optionnel, sur environnement ROS)
  # ─────────────────────────────────────────────
  build-ros:
    name: Build ROS2
    runs-on: ubuntu-24.04
    container:
      image: osrf/ros:jazzy-desktop
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y python3-pip python3-numpy
          pip install --break-system-packages numpy

      - name: Build workspace
        run: |
          source /opt/ros/jazzy/setup.bash
          colcon build --symlink-install
        shell: bash

      - name: Run colcon test
        run: |
          source /opt/ros/jazzy/setup.bash
          source install/setup.bash
          colcon test --packages-select stewart_control
          colcon test-result --verbose
        shell: bash

  # ─────────────────────────────────────────────
  # Job 4 : Compilation Arduino
  # ─────────────────────────────────────────────
  arduino:
    name: Arduino Compile
    runs-on: ubuntu-24.04
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install Arduino CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          echo "$PWD/bin" >> $GITHUB_PATH

      - name: Install Arduino core
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:avr
          arduino-cli lib install "PID"

      - name: Compile sketch
        run: |
          arduino-cli compile \
            --fqbn arduino:mega:atmega2560 \
            src/stewart_control/arduino/pilotage_feedback_mp.ino
