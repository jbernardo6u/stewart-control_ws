repos:
  - repo: local
    hooks:
      - id: black
        name: black
        entry: black
        language: system
        types: [python]
        exclude: ^(build|install|log)/

      - id: flake8
        name: flake8
        entry: flake8
        language: system
        types: [python]
        args: ['--max-line-length=88', '--extend-ignore=E203,W503']
        exclude: ^(build|install|log)/

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
        exclude: ^(build|install|log)/
      - id: trailing-whitespace
        exclude: ^(build|install|log)/
      - id: check-yaml
        exclude: ^(build|install|log)/
      - id: check-added-large-files
        exclude: ^(build|install|log)/
